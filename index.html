<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Event Ticket Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #fff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .header p {
            color: #a1a1aa;
            font-size: 14px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-card svg {
            width: 24px;
            height: 24px;
            margin-bottom: 6px;
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 11px;
            color: #a1a1aa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Button Group */
        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn svg {
            width: 18px;
            height: 18px;
        }

        .btn-start {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
        }

        .btn-start:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }

        .btn-stop {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .btn-stop:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(239, 68, 68, 0.4);
        }

        .btn-clear {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Scanner Area */
        .scanner-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #reader {
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
            border-radius: 16px;
            overflow: hidden;
        }

        #reader video {
            border-radius: 16px;
        }

        .scan-status {
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            color: #a1a1aa;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-active {
            color: #22c55e;
        }

        .status-cooldown {
            color: #f59e0b;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Cooldown Progress */
        .cooldown-progress {
            margin-top: 12px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f59e0b, #ef4444);
            width: 0%;
            transition: width 0.1s linear;
            border-radius: 2px;
        }

        .cooldown-text {
            text-align: center;
            font-size: 12px;
            color: #f59e0b;
            margin-top: 6px;
        }

        /* Result Card */
        .result-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .result-valid {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(34, 197, 94, 0.1));
            border-left: 4px solid #22c55e;
        }

        .result-invalid {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(239, 68, 68, 0.1));
            border-left: 4px solid #ef4444;
        }

        .result-used {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(245, 158, 11, 0.1));
            border-left: 4px solid #f59e0b;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .result-header svg {
            width: 28px;
            height: 28px;
        }

        .result-title {
            font-size: 18px;
            font-weight: bold;
        }

        .ticket-details {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .detail-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .detail-row svg {
            width: 18px;
            height: 18px;
            opacity: 0.7;
            flex-shrink: 0;
        }

        .detail-label {
            font-size: 13px;
            opacity: 0.7;
            min-width: 70px;
        }

        .detail-value {
            font-size: 14px;
            font-weight: 500;
            word-break: break-word;
            flex: 1;
        }

        /* History Section */
        .history-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .history-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 16px;
        }

        .history-title svg {
            width: 20px;
            height: 20px;
        }

        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .history-info {
            flex: 1;
        }

        .history-name {
            font-weight: 500;
            font-size: 14px;
        }

        .history-time {
            font-size: 11px;
            opacity: 0.6;
        }

        .history-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-valid {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .badge-used {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .badge-invalid {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .empty-history {
            text-align: center;
            padding: 30px;
            opacity: 0.5;
        }

        /* Scrollbar */
        .history-list::-webkit-scrollbar {
            width: 4px;
        }

        .history-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Event Ticket Scanner</h1>
            <p>Professional Check-in System</p>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 12V8H4v12h16v-4M12 2v20M2 12h4M18 12h4"/>
                    <rect x="2" y="4" width="20" height="16" rx="2"/>
                </svg>
                <span class="stat-number" id="totalScans">0</span>
                <span class="stat-label">Total Scans</span>
            </div>
            <div class="stat-card">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
                <span class="stat-number" id="validScans">0</span>
                <span class="stat-label">Valid</span>
            </div>
            <div class="stat-card">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span class="stat-number" id="invalidScans">0</span>
                <span class="stat-label">Invalid/Used</span>
            </div>
        </div>

        <!-- Buttons -->
        <div class="button-group">
            <button class="btn btn-start" onclick="startScan()" id="startBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
                Start Scan
            </button>
            <button class="btn btn-stop" onclick="stopScan()" id="stopBtn" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="6" y="4" width="12" height="16" rx="1"/>
                </svg>
                Stop
            </button>
            <button class="btn btn-clear" onclick="clearHistory()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
                Clear
            </button>
        </div>

        <!-- Scanner Area -->
        <div class="scanner-area">
            <div id="reader"></div>
            <div class="scan-status" id="scanStatus">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span id="statusText">Ready to scan</span>
            </div>
            <div class="cooldown-progress" id="cooldownContainer" style="display: none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="cooldown-text" id="cooldownText"></div>
            </div>
        </div>

        <!-- Result Card -->
        <div id="resultCard" class="result-card" style="display: none;">
            <div class="result-header">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
                <span class="result-title" id="resultTitle">Ticket Validated</span>
            </div>
            <div class="ticket-details" id="resultDetails"></div>
        </div>

        <!-- History Section -->
        <div class="history-section">
            <div class="history-header">
                <div class="history-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    Scan History
                </div>
                <span style="font-size: 12px; opacity: 0.6;" id="historyCount">0 records</span>
            </div>
            <div class="history-list" id="historyList">
                <div class="empty-history">No scans yet</div>
            </div>
        </div>
    </div>

    <script>
        let scanner;
        let isScanning = false;
        let cooldownActive = false;
        
        // Scan history storage
        let scanHistory = [];
        
        // Stats
        let stats = {
            total: 0,
            valid: 0,
            invalid: 0
        };
        
        // REPLACE THIS WITH YOUR APPS SCRIPT URL
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyo5Wuvl5ElgiheYhgghUaRkKNYSXPrhUNhl8m-_e5ZPfpTtHcJTpC7nbTc7UCxbht1/exec";
        
        // Load history from localStorage
        function loadHistory() {
            const saved = localStorage.getItem('ticketScanHistory');
            if (saved) {
                scanHistory = JSON.parse(saved);
                updateStats();
                renderHistory();
            }
        }
        
        // Save history to localStorage
        function saveHistory() {
            localStorage.setItem('ticketScanHistory', JSON.stringify(scanHistory));
            updateStats();
            renderHistory();
        }
        
        // Update statistics
        function updateStats() {
            stats.total = scanHistory.length;
            stats.valid = scanHistory.filter(h => h.status === 'VALID').length;
            stats.invalid = scanHistory.filter(h => h.status !== 'VALID').length;
            
            document.getElementById('totalScans').textContent = stats.total;
            document.getElementById('validScans').textContent = stats.valid;
            document.getElementById('invalidScans').textContent = stats.invalid;
            document.getElementById('historyCount').textContent = stats.total + ' record' + (stats.total !== 1 ? 's' : '');
        }
        
        // Add scan to history
        function addToHistory(data, status, code) {
            const historyItem = {
                id: Date.now(),
                timestamp: new Date().toISOString(),
                time: new Date().toLocaleTimeString(),
                date: new Date().toLocaleDateString(),
                status: status,
                code: code,
                fullName: data.fullName || 'Unknown',
                eventName: data.eventName || 'N/A',
                ticketType: data.ticketType || 'N/A'
            };
            
            scanHistory.unshift(historyItem); // Add to beginning
            if (scanHistory.length > 50) scanHistory.pop(); // Keep last 50 records
            saveHistory();
        }
        
        // Render history list
        function renderHistory() {
            const historyList = document.getElementById('historyList');
            
            if (scanHistory.length === 0) {
                historyList.innerHTML = '<div class="empty-history">No scans yet</div>';
                return;
            }
            
            historyList.innerHTML = scanHistory.map(item => `
                <div class="history-item">
                    <div class="history-info">
                        <div class="history-name">${escapeHtml(item.fullName)}</div>
                        <div class="history-time">${item.time} - ${item.date}</div>
                    </div>
                    <div class="history-badge badge-${item.status === 'VALID' ? 'valid' : (item.status === 'USED' ? 'used' : 'invalid')}">
                        ${item.status === 'VALID' ? 'Valid' : (item.status === 'USED' ? 'Used' : 'Invalid')}
                    </div>
                </div>
            `).join('');
        }
        
        // Clear history
        function clearHistory() {
            if (confirm('Clear all scan history?')) {
                scanHistory = [];
                saveHistory();
                updateStats();
                renderHistory();
            }
        }
        
        // Show result card
        function showResult(data, status) {
            const resultCard = document.getElementById('resultCard');
            const resultTitle = document.getElementById('resultTitle');
            const resultDetails = document.getElementById('resultDetails');
            
            resultCard.style.display = 'block';
            
            if (status === 'VALID') {
                resultCard.className = 'result-card result-valid';
                resultTitle.innerHTML = 'Ticket Validated';
                resultDetails.innerHTML = `
                    <div class="detail-row">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <span class="detail-label">Ticket Holder</span>
                        <span class="detail-value">${escapeHtml(data.fullName)}</span>
                    </div>
                    <div class="detail-row">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 12V8H4v12h16v-4M12 2v20M2 12h4M18 12h4"/>
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                        </svg>
                        <span class="detail-label">Event</span>
                        <span class="detail-value">${escapeHtml(data.eventName)}</span>
                    </div>
                    <div class="detail-row">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                        <span class="detail-label">Date & Time</span>
                        <span class="detail-value">${escapeHtml(data.eventDate)} at ${escapeHtml(data.eventTime)}</span>
                    </div>
                    <div class="detail-row">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg>
                        <span class="detail-label">Venue</span>
                        <span class="detail-value">${escapeHtml(data.venue)}</span>
                    </div>
                    <div class="detail-row">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16v16H4z"/>
                            <line x1="9" y1="9" x2="15" y2="15"/>
                            <line x1="15" y1="9" x2="9" y2="15"/>
                        </svg>
                        <span class="detail-label">Ticket Type</span>
                        <span class="detail-value">${escapeHtml(data.ticketType)}</span>
                    </div>
                `;
            } else if (status === 'USED') {
                resultCard.className = 'result-card result-used';
                resultTitle.innerHTML = 'Ticket Already Used';
                resultDetails.innerHTML = `
                    <div class="detail-row">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="12"/>
                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                        <span class="detail-label">Message</span>
                        <span class="detail-value">This ticket was already scanned on ${data.usedTime || 'an earlier date'}</span>
                    </div>
                `;
            } else {
                resultCard.className = 'result-card result-invalid';
                resultTitle.innerHTML = 'Invalid Ticket';
                resultDetails.innerHTML = `
                    <div class="detail-row">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="12"/>
                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                        <span class="detail-label">Message</span>
                        <span class="detail-value">The ticket code was not found in the system</span>
                    </div>
                `;
            }
        }
        
        // Hide result
        function hideResult() {
            document.getElementById('resultCard').style.display = 'none';
        }
        
        // Update scan status
        function updateScanStatus(text, isActive = false, isCooldown = false) {
            const statusText = document.getElementById('statusText');
            const statusIcon = document.querySelector('.scan-status svg');
            statusText.textContent = text;
            
            if (isActive) {
                document.querySelector('.scan-status').classList.add('status-active');
                document.querySelector('.scan-status').classList.remove('status-cooldown');
            } else if (isCooldown) {
                document.querySelector('.scan-status').classList.add('status-cooldown');
                document.querySelector('.scan-status').classList.remove('status-active');
            } else {
                document.querySelector('.scan-status').classList.remove('status-active');
                document.querySelector('.scan-status').classList.remove('status-cooldown');
            }
        }
        
        // Show cooldown with progress
        async function startCooldown(seconds) {
            cooldownActive = true;
            const cooldownContainer = document.getElementById('cooldownContainer');
            const progressFill = document.getElementById('progressFill');
            const cooldownText = document.getElementById('cooldownText');
            
            cooldownContainer.style.display = 'block';
            
            for (let i = seconds; i >= 0; i--) {
                const progressPercent = ((seconds - i) / seconds) * 100;
                progressFill.style.width = `${progressPercent}%`;
                cooldownText.textContent = `⏱️ Next scan in ${i} second${i !== 1 ? 's' : ''}`;
                updateScanStatus(`Cooldown: ${i}s`, false, true);
                await new Promise(resolve => setTimeout(resolve, 1000));
            }
            
            cooldownContainer.style.display = 'none';
            cooldownActive = false;
            updateScanStatus('Ready to scan', true);
        }
        
        async function startScan() {
            if (scanner && isScanning) {
                updateScanStatus('Scanner already running', false);
                return;
            }
            
            if (cooldownActive) {
                updateScanStatus('Please wait for cooldown', false, true);
                return;
            }
            
            if (scanner) {
                try {
                    await scanner.stop();
                    await scanner.clear();
                } catch(e) {}
                scanner = null;
            }
            
            const readerElement = document.getElementById("reader");
            readerElement.innerHTML = "";
            
            scanner = new Html5Qrcode("reader");
            
            const config = {
                fps: 10,
                qrbox: { width: 280, height: 280 },
                aspectRatio: 1.0
            };
            
            updateScanStatus('Initializing camera...', true);
            
            try {
                await scanner.start(
                    { facingMode: "environment" },
                    config,
                    onScanSuccess,
                    (error) => {}
                );
                isScanning = true;
                updateScanStatus('Scanner active - Ready', true);
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
            } catch(err) {
                updateScanStatus('Camera error: ' + err.message, false);
                alert("Camera error: " + err.message);
            }
        }
        
        async function onScanSuccess(decodedText) {
            if (cooldownActive) return;
            
            let rawCode = decodedText.trim();
            let code = rawCode;
            
            if (code.toUpperCase().startsWith("RECEIPT:")) {
                code = code.substring(8).trim();
            } else if (code.toUpperCase().startsWith("RECEIPT: ")) {
                code = code.substring(9).trim();
            }
            
            if (scanner && isScanning) {
                try {
                    await scanner.pause();
                    updateScanStatus('Processing...', false);
                } catch(e) {}
            }
            
            await verifyTicket(code);
            
            if (scanner && isScanning) {
                await startCooldown(8);
                try {
                    await scanner.resume();
                    updateScanStatus('Scanner active - Ready', true);
                } catch(e) {}
            }
        }
        
        async function verifyTicket(code) {
            hideResult();
            updateScanStatus('Verifying ticket...', false);
            
            const url = APPS_SCRIPT_URL + "?code=" + encodeURIComponent(code);
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                const response = await fetch(url, { signal: controller.signal });
                clearTimeout(timeoutId);
                const data = await response.json();
                
                if (data.status === "VALID") {
                    showResult(data, 'VALID');
                    addToHistory(data, 'VALID', code);
                    updateScanStatus('Valid ticket!', false);
                } else if (data.status === "USED") {
                    showResult(data, 'USED');
                    addToHistory(data, 'USED', code);
                    updateScanStatus('Ticket already used', false);
                } else {
                    showResult({}, 'INVALID');
                    addToHistory({ fullName: 'Unknown', eventName: 'N/A' }, 'INVALID', code);
                    updateScanStatus('Invalid ticket', false);
                }
            } catch(error) {
                showResult({}, 'INVALID');
                addToHistory({ fullName: 'Error', eventName: 'N/A' }, 'INVALID', code);
                updateScanStatus('Connection error', false);
            }
        }
        
        async function stopScan() {
            if (scanner && isScanning) {
                try {
                    await scanner.stop();
                    await scanner.clear();
                } catch(e) {}
                isScanning = false;
                scanner = null;
                cooldownActive = false;
                document.getElementById('cooldownContainer').style.display = 'none';
                updateScanStatus('Scanner stopped', false);
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
            }
        }
        
        function escapeHtml(str) {
            if (!str) return 'N/A';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        window.addEventListener('beforeunload', () => {
            if (scanner && isScanning) {
                scanner.stop().catch(e => {});
            }
        });
        
        loadHistory();
        updateScanStatus('Ready to scan', false);
    </script>
</body>
</html>
