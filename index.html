<!DOCTYPE html>
<html>
<head>
  <title>Ticket Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    #reader {
      width: 300px;
      margin: auto;
      margin-top: 20px;
    }

    button {
      padding: 10px;
      margin: 10px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      font-size: 18px;
    }

    .valid { background: green; }
    .invalid { background: red; }
    .used { background: orange; }
  </style>
</head>

<body>

<h2>🎟 Ticket Scanner</h2>

<button onclick="startScan()">Start Scan</button>
<button onclick="stopScan()">Stop Scan</button>

<div id="reader"></div>
<div id="result">Waiting for scan...</div>

<script>
let scanner;

// 🔊 Beep sound
function beep(type) {
  const audio = new Audio(
    type === "valid"
      ? "https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
      : "https://actions.google.com/sounds/v1/alarms/buzzer.ogg"
  );
  audio.play();
}

// 🚀 START SCAN
function startScan() {
  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {

      const code = decodedText.trim();

      verify(code);
    }
  );
}

// ⛔ STOP SCAN
function stopScan() {
  if (scanner) scanner.stop();
}

// 🔍 VERIFY TICKET
function verify(code) {

  const url =
    "https://script.google.com/macros/s/AKfycbxs2Ycz__LlZk3kJ7m4z0o_6r1n_8x_prI9_ZkF1fQUWfG_PiboqvyuesN05d6E3NgOog/exec?code=" + code;

  fetch(url)
    .then(res => res.json())
    .then(data => {

      const box = document.getElementById("result");

      if (data.status === "VALID") {

        beep("valid");

        box.className = "valid";
        box.innerHTML =
          "✅ VALID TICKET<br><br>" +
          "Name: " + data.fullName + "<br>" +
          "Event: " + data.eventName + "<br>" +
          "Venue: " + data.venue;

      } 
      else if (data.status === "USED") {

        beep("invalid");

        box.className = "used";
        box.innerHTML = "⚠ TICKET ALREADY USED";

      } 
      else {

        beep("invalid");

        box.className = "invalid";
        box.innerHTML = "❌ INVALID TICKET";
      }

    })
    .catch(() => {
      document.getElementById("result").className = "invalid";
      document.getElementById("result").innerHTML = "⚠ ERROR CONNECTING";
    });
}
</script>

</body>
</html>
